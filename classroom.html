const TOTAL_MAX_DECISION_SCORE = (2+3+3+4+2)*2; // 28

const CERT_LEVELS = [
  { min:90, label:"Project Manager",     color:"#D97706", desc:"PM Certificate Earned — Top Level" },
  { min:80, label:"Project Leader",      color:"#059669", desc:"Strong PM Thinking Throughout" },
  { min:60, label:"Project Coordinator", color:"#2563EB", desc:"Real PM Instincts Emerging" },
  { min:40, label:"Project Contributor", color:"#7C3AED", desc:"Solid Foundation Building" },
  { min:0,  label:"Project Participant", color:"#A8A29E", desc:"You Showed Up — Keep Going" },
];
const getCertLevel = (score, max) => {
  const pct = max > 0 ? Math.round((score/max)*100) : 0;
  return { ...CERT_LEVELS.find(l => pct >= l.min), pct };
};

const cap = (v,max) => Math.min(Math.max(0, Math.round(Number(v)||0)), max);
const pick = (arr) => arr[Math.floor(Math.random()*arr.length)];
const shuffle = (arr) => { const a=[...arr]; for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; };

// Build a decision object from a content slot: pick a prompt variant and
// shuffle the choices so the "best" answer isn't always in the same position.
function buildDecision(slot){
  return {
    prompt: pick(slot.prompts),
    choices: shuffle(slot.choices).map((c,i)=>({ ...c, id:["A","B","C"][i] })),
  };
}

function loadSave(){ try{ const r=localStorage.getItem(SAVE_KEY); return r?JSON.parse(r):null; }catch{ return null; } }
function writeSave(d){ try{ localStorage.setItem(SAVE_KEY,JSON.stringify(d)); }catch{} }

function Avatar({char,size=38}){
  const c=CHARS[char]||{initials:"?",color:"#888"};
  return <div style={{width:size,height:size,borderRadius:"50%",background:c.color+"18",border:`1.5px solid ${c.color}44`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:size*0.3,fontWeight:700,color:c.color,flexShrink:0,fontFamily:"system-ui"}}>{c.initials}</div>;
}

function PhaseBar({currentId,completed}){
  return(
    <div style={{display:"flex",gap:3,marginBottom:12}}>
      {PHASES.map(p=>{
        const done=completed.includes(p.id),active=p.id===currentId&&!done;
        return(
          <div key={p.id} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
            <div style={{width:"100%",height:6,borderRadius:3,background:done?p.color:active?p.color+"66":C.bgLight,transition:"background 0.4s"}}/>
            <div style={{fontSize:7,color:done?p.color:active?p.color:C.textMuted,fontFamily:"system-ui",fontWeight:done||active?700:400,textAlign:"center",lineHeight:1.3}}>
              <div style={{fontSize:9}}>{done?"✓":p.n}</div>
              <div>{p.short}</div>
            </div>
          </div>
        );
      })}
    </div>
  );
}

function Card({children,style={}}){
  return <div style={{background:C.bgCard,border:`1px solid ${C.border}`,borderRadius:14,padding:"16px 18px",animation:"fadeIn 0.4s ease",...style}}>{children}</div>;
}

function Btn({children,onClick,variant="primary",color=C.blue,disabled=false,full=false,small=false}){
  const[h,setH]=useState(false);
  const base={border:"none",borderRadius:10,fontWeight:700,cursor:disabled?"not-allowed":"pointer",fontFamily:"system-ui",transition:"all 0.15s",opacity:disabled?0.6:1,width:full?"100%":"auto",padding:small?"8px 14px":"13px 24px",fontSize:small?12:14};
  const s={
    primary:{...base,background:h&&!disabled?color+"dd":color,color:"#fff"},
    outline:{...base,background:h&&!disabled?C.bgLight:"transparent",color:C.textMid,border:`1.5px solid ${C.border}`},
    ghost:{...base,background:"none",color:C.textMid,padding:"6px 8px",fontSize:12},
  };
  return <button onClick={()=>!disabled&&onClick()} onMouseEnter={()=>setH(true)} onMouseLeave={()=>setH(false)} style={s[variant]||s.primary}>{children}</button>;
}

function ScoreBox({score,max,label,color}){
  const pct=max>0?score/max:0;

    </div>
  );
}

// ── Deterministic checkpoint & closeout builders (no AI; computed locally) ──
function buildCheckpoint(phase, decisions, phaseScore, maxPS, totalDS, maxDS){
  const cert = getCertLevel(totalDS, maxDS);
  const pct = maxPS>0 ? phaseScore/maxPS : 0;
  const best = decisions.filter(d=>d.choice.weight===2).length;
  const avoid = decisions.filter(d=>d.choice.weight===0).length;
  let headline, summary, strength, sharpen;
  if(pct>=0.9){ headline="Outstanding Phase Leadership"; summary=`You moved through ${phase.title} with real command, ${SCENARIO.learner.split(" ")[0]}. Your choices reflected the instincts of a project manager who plans before acting.`; }
  else if(pct>=0.6){ headline="Solid PM Thinking"; summary=`A strong phase overall. You showed genuine project judgment in ${phase.title}, with room to sharpen a decision or two.`; }
  else{ headline="A Learning Phase"; summary=`This phase had some tougher moments, and that's exactly where the real learning lives. Every project manager builds judgment through decisions like these.`; }
  strength = best>0 ? `You made ${best} strong, proactive call${best>1?"s":""} that a seasoned PM would recognize.` : `You stayed engaged and kept the project moving forward.`;
  sharpen = avoid>0 ? `Watch for the path of least resistance — a couple of choices leaned reactive where a proactive move would have served the project better.` : `Keep tightening the link between each decision and your documented plan.`;
  const lessonPool = {
    assignment:"Leadership starts by understanding what the person who hired you actually means by success — everything you build later gets measured against that shared picture.",
    assessment:"The real needs of a project live in people's daily reality, not in the vision statement. Listening to every zone — even the resistant ones — is how you find them.",
    planning:"Turning competing needs into a bounded, costed plan is what earns the trust to spend real money. A clear scope is what makes a vision fundable.",
    execution:"A pilot exists to teach you what the plan couldn't predict. The strongest leaders adapt to what they learn in motion — evaluating changes against cost without losing the thread.",
    closeout:"Closing well means measuring results against the goal you set at the start, telling the honest truth about what you learned, and earning the decision to go forward.",
  };
  return {
    headline, summary, strength, sharpen,
    pmLesson: lessonPool[phase.id],
    motivational: pct>=0.6 ? `You're leading like a project manager, ${SCENARIO.learner.split(" ")[0]}. On to the next phase.` : `Every strong PM has phases like this. Reset, refocus, and lead the next one.`,
    currentStanding: `Current standing: ${cert.label} — ${cert.pct}% of max score`,
  };
}

function buildCloseout(allHist, totalDS, maxDS){
  const cert = getCertLevel(totalDS, maxDS);
  const earned = cert.pct>=90;
  const tier = cert.pct>=80 ? "high" : cert.pct>=50 ? "mid" : "low";
  const dStatus = (good,okv) => tier==="high"?good:tier==="mid"?okv:"Not Achieved";
  return {
    headline: earned ? `You delivered the Classroom of the Future, ${SCENARIO.learner.split(" ")[0]}.` : `You led this project from charter to board, ${SCENARIO.learner.split(" ")[0]}.`,
    marcusDebrief: tier==="high"
      ? `Garius, you took a vague ambition and turned it into a funded, proven pilot. You listened before you built, you protected scope when it counted, and you told me the truth even when it wasn't flattering. The board saw a project manager, not a vendor.`
      : tier==="mid"
      ? `Garius, you got this across the line. There were moments I'd want sharper — a little more discipline on scope, a little more documentation — but you led a real pilot and brought the board real results. That's a foundation to build on.`
      : `Garius, this was a hard one, and you stayed in the seat the whole way. Some decisions got ahead of the evidence, and we felt it at the board. But you've now lived the full project lifecycle — and that experience is exactly what the CAPM is preparing you for.`,
    marcusFinal: earned
      ? `I handed you a sentence on a whiteboard — "meet students where they are." You handed me back a plan to do it. Well done, PM.`
      : `Run it again. You know the lifecycle now, and the certificate is closer than you think.`,
    vivianReaction: tier==="high"
      ? `I've buried four of these projects. This is the first one I'd actually fight to keep. You listened, and you followed through.`
      : tier==="mid" ? `Better than most. You showed up and you mostly followed through — that already puts you ahead.`
      : `I'll be honest — it felt familiar in the rough spots. But you're learning, and that counts for something.`,
    tylerReaction: tier==="high" ? `That was awesome! You kept us focused without killing the fun ideas. I learned a ton watching you manage scope.`
      : tier==="mid" ? `Good run! Wish we'd locked some things down sooner, but the kids loved it.`
      : `We had some chaos, but hey — we shipped a pilot. Next time, tighter scope, yeah?`,
    renaReaction: tier==="high" ? `You respected the budget and proved value with numbers. I'd fund your next project without hesitation.`
      : tier==="mid" ? `The numbers mostly held. A few surprises I didn't love, but defensible overall.`
      : `The spending got ahead of the plan more than once. The idea has merit — the financial discipline needs work.`,
    diazReaction: tier==="high" ? `You spoke to my building's reality, not just the superintendent's vision. My doors are open to phase two.`
      : tier==="mid" ? `It didn't hurt my numbers, and that's more than I expected. Cautiously on board.`
      : `I'm still not sure what this did for my school specifically. I needed to feel more like a partner than a participant.`,
    deliverables: [
      { item:SCENARIO.deliverables[0], status:dStatus("Achieved","Partially Achieved"), note: tier==="high"?"A clear, evidence-based vision grounded in real discovery.":tier==="mid"?"A vision was defined, though parts rested on assumption over evidence.":"The vision stayed loosely defined and hard to defend at the board." },
      { item:SCENARIO.deliverables[1], status:dStatus("Achieved","Partially Achieved"), note: tier==="high"?"A real pilot ran and produced measurable engagement gains.":tier==="mid"?"A pilot ran, but measurement against baseline was incomplete.":"The pilot happened but results were largely unmeasured." },
      { item:SCENARIO.deliverables[2], status:dStatus("Achieved","Partially Achieved"), note: tier==="high"?"A documented, board-ready implementation plan with justification.":tier==="mid"?"A plan was presented, though documentation had gaps.":"The scaling case lacked the evidence the board needed." },
    ],
    phaseRecaps: [
      { phase:"The Mandate", pmTerm:"sponsor's vision", lesson:"Understand what success means to the sponsor before you act." },
      { phase:"Into the Schools", pmTerm:"eliciting needs", lesson:"The real needs live in people's days — listen before you design." },
      { phase:"Building the Plan", pmTerm:"defining scope", lesson:"A bounded, costed plan is what makes a vision fundable." },
      { phase:"The Pilot", pmTerm:"adapting to change", lesson:"A pilot exists to teach you — adjust while the stakes are small." },
      { phase:"Facing the Board", pmTerm:"lessons learned", lesson:"Measure against the goal and tell the honest truth to close strong." },
    ],
    finalMessage: earned
      ? `You've earned the Project Manager Certificate on the Classroom of the Future. This is exactly the lifecycle thinking the CAPM rewards — carry it forward.`
      : `You're building real project-management instincts, ${SCENARIO.learner.split(" ")[0]}. The certificate is within reach — run it again and lead it even sharper.`,
  };
}

function App(){
  const[screen,setScreen]=useState("splash");
  const[phaseIdx,setPhaseIdx]=useState(0);
  const[completed,setCompleted]=useState([]);
  const[xp,setXp]=useState(0);
  const[totalDS,setTotalDS]=useState(0);
  const[maxDS,setMaxDS]=useState(0);
  const[rels,setRels]=useState({calhoun:50,vivian:50,tyler:50,rena:50,diaz:50});
  const[opener,setOpener]=useState(null);
  const[slotIdx,setSlotIdx]=useState(0);
  const[curDecision,setCurDecision]=useState(null);
  const[lastOutcome,setLastOutcome]=useState(null);
  const[checkpoint,setCheckpoint]=useState(null);
  const[phaseDecisions,setPhaseDecisions]=useState([]);
  const[phaseScore,setPhaseScore]=useState(0);
  const[decCount,setDecCount]=useState(0);
  const[allHist,setAllHist]=useState([]);
  const[closeout,setCloseout]=useState(null);
  const[error,setError]=useState(null);
  const[log,setLog]=useState([]);
  const[showLog,setShowLog]=useState(false);
  const[loginInput,setLoginInput]=useState("");
  const[loginErr,setLoginErr]=useState("");

  const phase=PHASES[phaseIdx];
  const maxPS=phase.maxDecisions*2;

  useEffect(()=>{
    const s=loadSave();
    if(s){ setPhaseIdx(s.phaseIdx||0);setCompleted(s.completed||[]);setXp(cap(s.xp||0,9999));
      setTotalDS(s.totalDS||0);setMaxDS(s.maxDS||0);
      setRels(s.rels||{calhoun:50,vivian:50,tyler:50,rena:50,diaz:50});
      setAllHist(s.allHist||[]);setLog(s.log||[]); }
  },[]);

  const save=(u={})=>writeSave({phaseIdx,completed,xp,totalDS,maxDS,rels,allHist,log,...u});

  const startPhase=()=>{
    const content=CONTENT[phase.id];
    setOpener(pick(content.openers));
    setSlotIdx(0);
    setCurDecision(buildDecision(content.slots[0]));
    setPhaseDecisions([]);setPhaseScore(0);setDecCount(0);
    setLastOutcome(null);setCheckpoint(null);setError(null);
    setScreen("decision");
  };

  const handleChoice=(choice)=>{
    const newCount=decCount+1;
    const rawScore=cap(choice.weight,2);
    const xpMap={2:20,1:13,0:6};
    const rawXP=xpMap[rawScore]||0;
    const newPS=cap(phaseScore+rawScore,maxPS);
    const newTotalDS=cap(totalDS+rawScore,TOTAL_MAX_DECISION_SCORE);
    const newMaxDS=maxDS+2;
    const newXP=cap(xp+rawXP,9999);
    // relationship deltas based on which character reacts + weight
    const newRels={...rels};
    const spk=choice.speaker;
    if(spk&&newRels[spk]!==undefined){ newRels[spk]=cap(newRels[spk]+(rawScore===2?4:rawScore===1?0:-4),100); }
    const isLast = newCount >= phase.maxDecisions;
    const out={ outcome:choice.outcome, speaker:choice.speaker, reaction:choice.reaction, coaching:choice.coaching, pmTerm:choice.pmTerm, score:rawScore, xp:rawXP, phaseComplete:isLast };
    const newDec=[...phaseDecisions,{choice:{...choice,weight:rawScore},outcome:out,prompt:curDecision.prompt}];
    const newLog=[...log,{phase:phase.title,decision:curDecision.prompt,chose:choice.label,weight:rawScore,outcome:choice.outcome,coaching:choice.coaching,pmTerm:choice.pmTerm}];
    setXp(newXP);setPhaseScore(newPS);setTotalDS(newTotalDS);setMaxDS(newMaxDS);
    setRels(newRels);setPhaseDecisions(newDec);setLastOutcome(out);
    setDecCount(newCount);setLog(newLog);
    save({xp:newXP,totalDS:newTotalDS,maxDS:newMaxDS,rels:newRels,log:newLog});
    setScreen("outcome");
  };

  const handleContinue=()=>{
    if(lastOutcome?.phaseComplete){
      const cp=buildCheckpoint(phase,phaseDecisions,phaseScore,maxPS,totalDS,maxDS);
      const newXP=cap(xp+15,9999);
      const newCompleted=[...completed,phase.id];
      const newHist=[...allHist,{phaseId:phase.id,phaseTitle:phase.title,decisions:phaseDecisions,checkpoint:cp,phaseScore,maxPhaseScore:maxPS}];
      setCheckpoint(cp);setXp(newXP);setCompleted(newCompleted);setAllHist(newHist);
      save({xp:newXP,completed:newCompleted,allHist:newHist});setScreen("checkpoint");
    }else{
      const nextSlot=slotIdx+1;
      setSlotIdx(nextSlot);
      setCurDecision(buildDecision(CONTENT[phase.id].slots[nextSlot]));
      setScreen("decision");
    }
  };

  const handleNextPhase=()=>{
    if(phaseIdx<PHASES.length-1){
      const next=phaseIdx+1;setPhaseIdx(next);save({phaseIdx:next});setScreen("phaseIntro");
    }else{
      setCloseout(buildCloseout(allHist,totalDS,maxDS));
      setScreen("closeout");
    }
  };

  const resetAll=()=>{
    try{ localStorage.removeItem(SAVE_KEY); }catch{}

      <div style={{fontSize:40}}>💾</div>
      <h2 style={{color:C.text,fontSize:20,fontWeight:900,margin:0,fontFamily:"Georgia,serif"}}>Progress Saved</h2>
      <p style={{color:C.textMid,fontSize:13,textAlign:"center",maxWidth:280,lineHeight:1.65,fontFamily:"system-ui"}}>You're in Phase {phase.n}: {phase.title}. Come back anytime — your progress will be right here, {SCENARIO.learner.split(" ")[0]}.</p>
      <Btn onClick={()=>setScreen("splash")} color={C.blue}>Back to Home</Btn>
    </div>
  );

  // ── PHASE INTRO ──
  if(screen==="phaseIntro") return(
    <div style={{minHeight:"100vh",background:C.bg,padding:"24px 16px",fontFamily:"Georgia,serif"}}>
      <div style={{maxWidth:480,margin:"0 auto"}}>
        <PhaseBar currentId={phase.id} completed={completed}/>
        <div style={{textAlign:"center",marginBottom:16}}>
          <div style={{fontSize:42,marginBottom:8}}>{phase.icon}</div>
          <div style={{fontSize:10,color:phase.color,letterSpacing:"0.3em",textTransform:"uppercase",marginBottom:4,fontFamily:"system-ui",fontWeight:700}}>Phase {phase.n} of {PHASES.length}</div>
          <h2 style={{fontSize:21,fontWeight:900,color:C.text,margin:"0 0 2px",lineHeight:1.2}}>{phase.title}</h2>
          <div style={{fontSize:10,color:phase.color,fontFamily:"system-ui",fontStyle:"italic"}}>{phase.pmbok}</div>
        </div>
        {phase.n===1&&(
          <Card style={{marginBottom:12,background:C.blueLight,border:`1.5px solid ${C.blueBorder}`}}>
            <p style={{color:"#1E40AF",fontSize:13,lineHeight:1.9,margin:0,fontFamily:"system-ui"}}>
              Garius, this simulation puts you in the lead seat of a real project — with real decisions and real trade-offs. There are no trick questions, only choices that matter. <strong>Mistakes along the way are not failure here, but leadership learning opportunities.</strong> Your goal is to think, lead, and decide like a project manager.
            </p>
          </Card>
        )}
        <Card style={{marginBottom:12,background:phase.bg,border:`1.5px solid ${phase.color}33`}}>
          <div style={{fontSize:10,color:phase.color,fontFamily:"system-ui",fontWeight:700,marginBottom:5,textTransform:"uppercase",letterSpacing:"0.1em"}}>What This Phase Is About</div>
          <p style={{color:C.textMid,fontSize:13,lineHeight:1.7,margin:"0 0 10px",fontFamily:"system-ui"}}>{phase.purpose}</p>
          <div style={{fontSize:11,color:C.textMuted,fontFamily:"system-ui",marginBottom:4}}>{phase.maxDecisions} decisions · {phase.minutes} · Up to {maxPS} pts this phase</div>
          <div style={{fontSize:11,color:phase.color,fontFamily:"system-ui",fontWeight:600}}>Each decision: 0, 1, or 2 points based on your choice</div>
        </Card>
        {phase.n>1&&(
          <div style={{background:C.goldLight,border:`1px solid ${C.goldBorder}`,borderRadius:10,padding:"8px 12px",marginBottom:12,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <span style={{fontSize:12,color:"#78350F",fontFamily:"system-ui"}}>🏆 PM Certificate at 90%</span>
            <span style={{fontSize:12,color:C.gold,fontFamily:"system-ui",fontWeight:700}}>{maxDS>0?Math.round((totalDS/maxDS)*100):0}% so far</span>
          </div>
        )}
        <Btn full onClick={startPhase} color={phase.color}>
          {phase.n===1?"Start the Project →":`Begin Phase ${phase.n} →`}
        </Btn>
      </div>
    </div>
  );

  // ── DECISION ──
  if(screen==="decision"&&opener&&curDecision) return(
    <div style={{minHeight:"100vh",background:C.bg,padding:"24px 16px",fontFamily:"Georgia,serif"}}>
      <div style={{maxWidth:520,margin:"0 auto"}}>
        <Header/>
        {showLog&&<LogPanel/>}
        <Card style={{marginBottom:10,opacity:0.78,background:C.bgLight}}>
          <p style={{color:C.textMid,fontSize:12,lineHeight:1.7,margin:0,fontFamily:"system-ui"}}>{opener.scene}</p>
        </Card>
        <div style={{display:"flex",gap:10,alignItems:"flex-start",background:C.bgCard,border:`1px solid ${C.border}`,borderRadius:12,padding:12,marginBottom:14,opacity:0.85}}>
          <Avatar char={opener.speaker} size={36}/>
          <div style={{flex:1}}>
            <div style={{fontSize:10,color:CHARS[opener.speaker]?.color||C.blue,fontWeight:700,marginBottom:4,fontFamily:"system-ui"}}>{CHARS[opener.speaker]?.name} · {CHARS[opener.speaker]?.role}</div>
            <p style={{color:C.text,fontSize:13,lineHeight:1.7,margin:0,fontStyle:"italic",fontFamily:"system-ui"}}>"{opener.dialogue}"</p>
          </div>
        </div>
        <div style={{background:phase.bg,border:`2.5px solid ${phase.color}66`,borderRadius:12,padding:"14px 16px",marginBottom:14}}>
          <div style={{fontSize:10,color:phase.color,letterSpacing:"0.25em",textTransform:"uppercase",marginBottom:8,fontFamily:"system-ui",fontWeight:800}}>Your Decision</div>
          <p style={{color:C.text,fontSize:16,lineHeight:1.6,margin:0,fontWeight:800,fontFamily:"system-ui"}}>{curDecision.prompt}</p>
        </div>
        {curDecision.choices.map(c=><ChoiceCard key={c.id} choice={c} onSelect={handleChoice} disabled={false} color={phase.color}/>)}
        {opener.pmConcept&&(
          <div style={{marginTop:8,padding:"6px 12px",background:C.bgLight,borderRadius:8,border:`1px dashed ${C.border}`}}>
            <span style={{fontSize:10,color:C.textMuted,fontFamily:"system-ui"}}>PM concept in focus: </span>
            <span style={{fontSize:10,color:phase.color,fontWeight:700,fontFamily:"system-ui"}}>{opener.pmConcept}</span>
          </div>
        )}
      </div>
    </div>
  );

  // ── OUTCOME ──
  if(screen==="outcome"&&lastOutcome) return(
    <div style={{minHeight:"100vh",background:C.bg,padding:"24px 16px",fontFamily:"Georgia,serif"}}>
      <div style={{maxWidth:520,margin:"0 auto"}}>
        <Header/>
        {showLog&&<LogPanel/>}
        <Card style={{marginBottom:10,borderLeft:`4px solid ${phase.color}`}}>
          <div style={{fontSize:10,color:phase.color,letterSpacing:"0.2em",textTransform:"uppercase",marginBottom:7,fontFamily:"system-ui",fontWeight:700}}>What Happened</div>
          <p style={{color:C.text,fontSize:13,lineHeight:1.75,margin:0,fontFamily:"system-ui"}}>{lastOutcome.outcome}</p>
        </Card>
        {lastOutcome.reaction&&(
          <div style={{display:"flex",gap:10,alignItems:"flex-start",background:C.bgCard,border:`1px solid ${C.border}`,borderRadius:12,padding:12,marginBottom:10}}>
            <Avatar char={lastOutcome.speaker} size={32}/>
            <div>
              <div style={{fontSize:10,color:CHARS[lastOutcome.speaker]?.color||C.blue,fontWeight:700,marginBottom:3,fontFamily:"system-ui"}}>{CHARS[lastOutcome.speaker]?.name}</div>
              <p style={{color:C.textMid,fontSize:13,lineHeight:1.65,margin:0,fontStyle:"italic",fontFamily:"system-ui"}}>"{lastOutcome.reaction}"</p>
            </div>
          </div>
        )}
        <Card style={{marginBottom:10,background:C.greenLight,border:`1px solid ${C.greenBorder}`}}>
          <div style={{fontSize:10,color:C.green,letterSpacing:"0.2em",textTransform:"uppercase",marginBottom:7,fontFamily:"system-ui",fontWeight:700}}>Coach's Note</div>
          <p style={{color:"#14532D",fontSize:13,lineHeight:1.75,margin:"0 0 8px",fontFamily:"system-ui"}}>{lastOutcome.coaching}</p>
          {lastOutcome.pmTerm&&<Pill label={lastOutcome.pmTerm} color={C.green}/>}
        </Card>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
          <span style={{fontSize:12,color:C.green,fontFamily:"system-ui",fontWeight:600}}>+{lastOutcome.xp} XP</span>
          <span style={{fontSize:12,color:phase.color,fontFamily:"system-ui",fontWeight:600}}>Decision: {lastOutcome.score}/2 pts</span>
        </div>
        {lastOutcome.phaseComplete&&(
          <Card style={{marginBottom:12,background:phase.bg,border:`2.5px solid ${phase.color}`,textAlign:"center",padding:"14px"}}>
            <div style={{fontSize:22,marginBottom:5}}>{phase.icon}</div>
            <div style={{fontSize:14,color:phase.color,fontWeight:900,fontFamily:"system-ui",letterSpacing:"0.05em",marginBottom:2}}>PHASE {phase.n} COMPLETE</div>
            <div style={{fontSize:11,color:C.textMid,fontFamily:"system-ui"}}>{phase.title} · Gate Passed ✓</div>
          </Card>
        )}
        <Btn full onClick={handleContinue} color={phase.color}>
          {lastOutcome.phaseComplete?"See Phase Summary →":"Continue →"}
        </Btn>
      </div>
    </div>
  );

  // ── CHECKPOINT ──
  if(screen==="checkpoint"&&checkpoint) return(
    <div style={{minHeight:"100vh",background:C.bg,padding:"24px 16px",fontFamily:"Georgia,serif"}}>
      <div style={{maxWidth:480,margin:"0 auto"}}>
        <div style={{textAlign:"center",marginBottom:16}}>
          <div style={{fontSize:44,marginBottom:8}}>{phase.icon}</div>
          <div style={{fontSize:10,color:phase.color,letterSpacing:"0.3em",textTransform:"uppercase",marginBottom:4,fontFamily:"system-ui",fontWeight:700}}>Phase {phase.n} Gate — Passed ✓</div>
          <h2 style={{fontSize:20,fontWeight:900,color:C.text,margin:0,lineHeight:1.3}}>{checkpoint.headline}</h2>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12}}>
          <ScoreBox score={phaseScore} max={maxPS} label={`Phase ${phase.n} Score`}/>
          <ScoreBox score={totalDS} max={maxDS||1} label="Overall Score" color={C.blue}/>
        </div>
        {maxDS>0&&(()=>{
          const cert=getCertLevel(totalDS,maxDS);
          return(
            <div style={{background:C.goldLight,border:`1px solid ${C.goldBorder}`,borderRadius:10,padding:"8px 14px",marginBottom:12,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div>
                <div style={{fontSize:10,color:C.gold,fontFamily:"system-ui",fontWeight:700,textTransform:"uppercase",letterSpacing:"0.1em"}}>Current Standing</div>
                <div style={{fontSize:13,color:"#78350F",fontFamily:"system-ui",fontWeight:700}}>{cert.label} · {cert.pct}%</div>
              </div>
              <div style={{fontSize:11,color:C.gold,fontFamily:"system-ui",textAlign:"right"}}>🏆 90% for<br/>Certificate</div>
            </div>
          );
        })()}
        <Card style={{marginBottom:12}}>
          <p style={{color:C.textMid,fontSize:13,lineHeight:1.75,margin:"0 0 12px",fontFamily:"system-ui"}}>{checkpoint.summary}</p>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:12}}>
            <div style={{background:C.greenLight,border:`1px solid ${C.greenBorder}`,borderRadius:10,padding:10}}>
              <div style={{fontSize:9,color:C.green,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:4,fontFamily:"system-ui",fontWeight:700}}>What You Did Well</div>
              <p style={{color:"#14532D",fontSize:12,lineHeight:1.55,margin:0,fontFamily:"system-ui"}}>{checkpoint.strength}</p>
            </div>
            <div style={{background:C.amberLight,border:`1px solid ${C.amberBorder}`,borderRadius:10,padding:10}}>
              <div style={{fontSize:9,color:C.amber,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:4,fontFamily:"system-ui",fontWeight:700}}>To Sharpen</div>
              <p style={{color:"#78350F",fontSize:12,lineHeight:1.55,margin:0,fontFamily:"system-ui"}}>{checkpoint.sharpen}</p>
            </div>
          </div>
          <div style={{background:C.blueLight,border:`1px solid ${C.blueBorder}`,borderRadius:10,padding:10,marginBottom:10}}>
            <div style={{fontSize:9,color:C.blue,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:4,fontFamily:"system-ui",fontWeight:700}}>PM Lesson</div>
            <p style={{color:"#1E40AF",fontSize:13,lineHeight:1.65,margin:0,fontFamily:"system-ui"}}>{checkpoint.pmLesson}</p>
          </div>
          <div style={{borderTop:`1px solid ${C.bgLight}`,paddingTop:10,textAlign:"center"}}>
            <p style={{color:C.text,fontSize:13,fontWeight:700,margin:0,lineHeight:1.6,fontFamily:"system-ui"}}>{checkpoint.motivational}</p>
          </div>
        </Card>
        <Btn full onClick={handleNextPhase} color={phaseIdx<PHASES.length-1?PHASES[phaseIdx+1].color:C.gold}>
          {phaseIdx<PHASES.length-1?`Enter Phase ${phaseIdx+2}: ${PHASES[phaseIdx+1].title} →`:"Close Out the Project →"}
        </Btn>
      </div>
    </div>
  );

  // ── CLOSEOUT ──
  if(screen==="closeout"&&closeout){
    const cert=getCertLevel(totalDS,maxDS||1);
    return(
      <div style={{minHeight:"100vh",background:C.bg,padding:"24px 16px",fontFamily:"Georgia,serif"}}>
        <div style={{maxWidth:520,margin:"0 auto"}}>
          <div style={{textAlign:"center",marginBottom:16}}>
            <div style={{fontSize:40,marginBottom:8}}>🎓</div>
            <div style={{fontSize:10,color:C.gold,letterSpacing:"0.3em",textTransform:"uppercase",marginBottom:6,fontFamily:"system-ui",fontWeight:700}}>Project Complete — {SCENARIO.district}</div>
            <h2 style={{fontSize:20,fontWeight:900,color:C.text,margin:"0 0 4px",lineHeight:1.2}}>{closeout.headline}</h2>
          </div>
          <CertificateBadge cert={cert} score={totalDS} max={maxDS||1}/>
          {closeout.deliverables&&(
            <Card style={{marginBottom:12}}>
              <div style={{fontSize:11,color:C.textMuted,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:4,fontFamily:"system-ui"}}>Your Deliverables</div>
              <div style={{fontSize:10,color:C.textMuted,fontFamily:"system-ui",marginBottom:10,fontStyle:"italic"}}>Calhoun's 3 Requirements — Results</div>
              {closeout.deliverables.map((d,i)=><DeliverableRow key={i} {...d}/>)}
            </Card>
          )}
          <div style={{display:"flex",gap:10,alignItems:"flex-start",background:C.bgCard,border:`1px solid ${C.border}`,borderRadius:12,padding:14,marginBottom:10}}>
            <Avatar char="calhoun" size={38}/>
            <div>
              <div style={{fontSize:10,color:CHARS.calhoun.color,fontWeight:700,marginBottom:4,fontFamily:"system-ui"}}>Dr. Marcus Calhoun · Final Debrief</div>
              <p style={{color:C.text,fontSize:13,lineHeight:1.75,margin:"0 0 6px",fontFamily:"system-ui"}}>"{closeout.marcusDebrief}"</p>
              <p style={{color:C.textMid,fontSize:12,lineHeight:1.65,margin:0,fontStyle:"italic",fontFamily:"system-ui"}}>"{closeout.marcusFinal}"</p>
            </div>
          </div>
          <Card style={{marginBottom:10}}>
            <div style={{fontSize:11,color:C.textMuted,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:10,fontFamily:"system-ui"}}>Stakeholder Reactions</div>
            {[["vivian",closeout.vivianReaction],["diaz",closeout.diazReaction],["tyler",closeout.tylerReaction],["rena",closeout.renaReaction]].map(([k,r])=>(
              <div key={k} style={{display:"flex",gap:8,alignItems:"flex-start",marginBottom:10}}>
                <Avatar char={k} size={30}/>
                <div>
                  <div style={{fontSize:10,color:CHARS[k]?.color,fontWeight:700,fontFamily:"system-ui",marginBottom:2}}>{CHARS[k]?.name}</div>
                  <p style={{color:C.textMid,fontSize:12,lineHeight:1.6,margin:0,fontStyle:"italic",fontFamily:"system-ui"}}>"{r}"</p>
                </div>
              </div>
            ))}
          </Card>
          <Card style={{marginBottom:10}}>
            <div style={{fontSize:11,color:C.textMuted,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:10,fontFamily:"system-ui"}}>What You Learned — Phase by Phase</div>
            {closeout.phaseRecaps.map((r,i)=>(
              <div key={i} style={{display:"flex",gap:8,alignItems:"flex-start",padding:"7px 0",borderBottom:`1px solid ${C.bgLight}`}}>
                <span style={{fontSize:14,flexShrink:0}}>{PHASES[i]?.icon}</span>
                <div style={{flex:1}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:2,gap:4}}>
                    <div style={{fontSize:12,color:C.text,fontWeight:700,fontFamily:"system-ui"}}>{r.phase}</div>
                    <Pill label={r.pmTerm} color={PHASES[i]?.color||C.blue}/>
                  </div>
                  <div style={{fontSize:11,color:C.textMid,fontFamily:"system-ui",lineHeight:1.5}}>{r.lesson}</div>
                </div>
              </div>
            ))}
          </Card>
          <Card style={{marginBottom:14,background:cert.pct>=90?C.goldLight:C.greenLight,border:`1px solid ${cert.pct>=90?C.goldBorder:C.greenBorder}`}}>
            <p style={{color:cert.pct>=90?"#78350F":"#14532D",fontSize:13,lineHeight:1.8,margin:0,fontFamily:"system-ui",fontStyle:"italic",textAlign:"center"}}>"{closeout.finalMessage}"</p>
          </Card>
          <Btn full onClick={resetAll} variant="outline">Run It Again →</Btn>
        </div>
      </div>
    );
  }

  return null;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
